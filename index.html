<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<title>remoraschle.github.io</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		html, body {
			height: 100%;
			overflow: hidden;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}

		.scene {
			position: relative;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: linear-gradient(180deg,
				#050a1f 0%,
				#0f1535 8%,
				#1a1548 14%,
				#2d1a5a 20%,
				#4a2555 28%,
				#7a3a5a 38%,
				#b84a4a 48%,
				#d86a3a 56%,
				#f09a4a 62%,
				#ffc060 68%,
				#ffe8a0 74%,
				#f0e4d8 80%,
				#e8f0f8 88%,
				#ffffff 100%
			);
		}

		/* God rays / crepuscular rays from sun */
		.rays {
			position: absolute;
			top: 0;
			left: 50%;
			width: 100%;
			height: 100%;
			margin-left: -50%;
			pointer-events: none;
			z-index: 2;
			background:
				repeating-linear-gradient(
					15deg,
					transparent 0,
					transparent 80px,
					rgba(255, 200, 100, 0.04) 80px,
					rgba(255, 200, 100, 0.04) 160px
				),
				repeating-linear-gradient(
					-12deg,
					transparent 0,
					transparent 100px,
					rgba(255, 180, 80, 0.03) 100px,
					rgba(255, 180, 80, 0.03) 200px
				);
			opacity: 0.6;
			animation: rays-shimmer 8s ease-in-out infinite;
		}

		@keyframes rays-shimmer {
			0%, 100% { opacity: 0.5; }
			50% { opacity: 0.75; }
		}

		/* Atmospheric haze layers */
		.haze {
			position: absolute;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 3;
		}

		.haze::before {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 35%;
			background: radial-gradient(ellipse at 50% -50%, rgba(255,200,100,0.15) 0%, transparent 60%);
			opacity: 0.8;
		}

		.haze::after {
			content: "";
			position: absolute;
			top: 45%;
			left: 0;
			width: 100%;
			height: 30%;
			background: linear-gradient(180deg, rgba(255,220,180,0.08) 0%, rgba(200,180,160,0.04) 100%);
		}

		/* Stars in night sky */
		.stars {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 45%;
			pointer-events: none;
			z-index: 1;
		}

		.stars::before,
		.stars::after {
			content: "";
			position: absolute;
			width: 100%;
			height: 100%;
			background-image:
				radial-gradient(1.5px 1.5px at 8% 12%, rgba(255,255,255,0.95), transparent),
				radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1.5px 1.5px at 42% 18%, rgba(255,255,255,0.9), transparent),
				radial-gradient(1px 1px at 62% 6%, rgba(255,255,255,0.7), transparent),
				radial-gradient(2px 2px at 78% 14%, rgba(255,255,255,0.85), transparent),
				radial-gradient(1px 1px at 90% 4%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1.5px 1.5px at 15% 35%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.7), transparent),
				radial-gradient(1px 1px at 35% 40%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1.5px 1.5px at 88% 28%, rgba(255,255,255,0.8), transparent);
			background-size: 100% 100%;
			background-repeat: no-repeat;
			animation: twinkle 4s ease-in-out infinite;
		}

		.stars::after {
			animation: twinkle 5.5s ease-in-out infinite reverse;
			opacity: 0.6;
		}

		@keyframes twinkle {
			0%, 100% { opacity: 0.4; }
			50% { opacity: 0.8; }
		}

		/* Sun glow and corona */
		.sun {
			position: absolute;
			top: 50%;
			left: 50%;
			width: 380px;
			height: 380px;
			margin-left: -190px;
			margin-top: -190px;
			pointer-events: none;
			z-index: 1;
		}

		.sun::before {
			content: "";
			position: absolute;
			inset: 0;
			border-radius: 50%;
			background: radial-gradient(circle,
				rgba(255, 250, 230, 1) 0%,
				rgba(255, 240, 200, 0.8) 8%,
				rgba(255, 200, 100, 0.5) 18%,
				rgba(255, 160, 80, 0.25) 32%,
				rgba(255, 120, 60, 0.08) 50%,
				transparent 70%
			);
			filter: blur(2px);
			animation: sun-glow 5s ease-in-out infinite;
		}

		.sun::after {
			content: "";
			position: absolute;
			inset: -20px;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(255, 180, 100, 0.15) 0%, transparent 60%);
			filter: blur(8px);
			animation: sun-corona 7s ease-in-out infinite reverse;
		}

		@keyframes sun-glow {
			0%, 100% { transform: scale(1) translateY(0); opacity: 0.9; }
			50% { transform: scale(1.08) translateY(-6px); opacity: 1; }
		}

		@keyframes sun-corona {
			0%, 100% { transform: scale(1); opacity: 0.5; }
			50% { transform: scale(1.15); opacity: 0.7; }
		}

		/* Mountain layers with sophisticated gradients */
		.mountains {
			position: absolute;
			left: 0;
			width: 100%;
			pointer-events: none;
			z-index: 4;
		}

		.mountains.far {
			bottom: 47%;
			height: 30%;
			opacity: 0.45;
			filter: blur(1.5px);
		}

		.mountains.mid {
			bottom: 45%;
			height: 28%;
			opacity: 0.7;
			filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
		}

		.mountains.near {
			bottom: 43%;
			height: 26%;
			opacity: 1;
			filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.2));
		}

		/* Pine forest silhouette */
		.forest {
			position: absolute;
			bottom: 43%;
			left: 0;
			width: 100%;
			height: 20%;
			pointer-events: none;
			z-index: 5;
			opacity: 0.9;
			filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
		}

		/* Slope area */
		.slope {
			position: absolute;
			bottom: 0;
			left: 0;
			width: 100%;
			height: 57%;
			overflow: hidden;
			background: linear-gradient(180deg,
				rgba(250, 252, 255, 0.6) 0%,
				rgba(255, 255, 255, 0.85) 20%,
				rgba(255, 255, 255, 0.95) 50%,
				rgba(250, 250, 255, 1) 100%
			);
			box-shadow: inset 0 -40px 60px rgba(0, 0, 0, 0.08);
		}

		/* Slope texture: subtle diagonal patterns */
		.slope::before {
			content: "";
			position: absolute;
			inset: 0;
			background-image:
				repeating-linear-gradient(
					90deg,
					transparent 0,
					transparent 140px,
					rgba(150, 180, 220, 0.05) 140px,
					rgba(150, 180, 220, 0.05) 142px
				),
				repeating-linear-gradient(
					35deg,
					transparent 0,
					transparent 300px,
					rgba(200, 200, 240, 0.03) 300px,
					rgba(200, 200, 240, 0.03) 302px
				),
				radial-gradient(ellipse 500px 300px at 50% -100px,
					rgba(255, 200, 100, 0.06) 0%,
					transparent 100%
				);
			pointer-events: none;
			z-index: 1;
		}

		/* Falling snow: multi-layer parallax */
		.snowfall {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 50;
		}

		.snowfall::before {
			content: "";
			position: absolute;
			width: 100%;
			height: 130%;
			background-image:
				radial-gradient(1.5px 1.5px at 5% 15%, rgba(255,255,255,0.95), transparent),
				radial-gradient(1.5px 1.5px at 18% 40%, rgba(255,255,255,0.88), transparent),
				radial-gradient(1px 1px at 35% 20%, rgba(255,255,255,0.9), transparent),
				radial-gradient(2px 2px at 50% 60%, rgba(255,255,255,0.85), transparent),
				radial-gradient(1px 1px at 68% 35%, rgba(255,255,255,0.92), transparent),
				radial-gradient(1.5px 1.5px at 82% 55%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1px 1px at 25% 75%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1.5px 1.5px at 75% 15%, rgba(255,255,255,0.85), transparent);
			background-size: 100% 100%;
			background-repeat: repeat;
			animation: snow-fall-slow 10s linear infinite;
		}

		.snowfall::after {
			content: "";
			position: absolute;
			width: 100%;
			height: 130%;
			background-image:
				radial-gradient(1px 1px at 12% 25%, rgba(255,255,255,0.85), transparent),
				radial-gradient(1.5px 1.5px at 45% 50%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.9), transparent),
				radial-gradient(1.5px 1.5px at 30% 55%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,0.82), transparent);
			background-size: 100% 100%;
			background-repeat: repeat;
			opacity: 0.7;
			animation: snow-fall-medium 7s linear infinite;
			filter: blur(0.3px);
		}

		@keyframes snow-fall-slow {
			0% { transform: translateY(-100%); }
			100% { transform: translateY(100%); }
		}

		@keyframes snow-fall-medium {
			0% { transform: translateY(-100%) translateX(-2px); }
			100% { transform: translateY(100%) translateX(2px); }
		}

		/* Chairlift in the distance */
		.chairlift {
			position: absolute;
			top: 18%;
			right: 4%;
			width: 38%;
			height: 38%;
			pointer-events: none;
			z-index: 4;
			opacity: 0.78;
			filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.18));
		}

		.chair-swing {
			animation: chair-sway 3.6s ease-in-out infinite alternate;
			transform-origin: 0 0;
		}

		.chair-swing.s-2 { animation-duration: 4.4s; animation-delay: -1.2s; }
		.chair-swing.s-3 { animation-duration: 3.1s; animation-delay: -2.4s; }
		.chair-swing.s-4 { animation-duration: 4.8s; animation-delay: -0.6s; }
		.chair-swing.s-5 { animation-duration: 3.7s; animation-delay: -3.0s; }

		@keyframes chair-sway {
			from { transform: rotate(-3deg); }
			to   { transform: rotate(3deg); }
		}

		/* Static ski tracks decorating the slope (prior runs) */
		.ski-tracks {
			position: absolute;
			inset: 0;
			pointer-events: none;
			z-index: 2;
			opacity: 0.55;
		}

		/* Slalom flags */
		.flags {
			position: absolute;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 5;
		}

		/* Slalom gate: two poles with a flag panel between them. Red/blue alternate. */
		.gate {
			position: absolute;
			width: 42px;
			height: 64px;
			--gate-color: #e63946;
			--gate-light: #ff5560;
			--gate-deep: #b51f30;
			filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.22));
		}

		.gate.blue {
			--gate-color: #1d6fd1;
			--gate-light: #3d9cff;
			--gate-deep: #114a91;
		}

		/* Two gate poles */
		.gate::before,
		.gate::after {
			content: "";
			position: absolute;
			top: 0;
			width: 3px;
			height: 100%;
			border-radius: 1.5px;
			background: linear-gradient(180deg,
				#ffffff 0%,
				var(--gate-light) 7%,
				var(--gate-color) 22%,
				var(--gate-deep) 100%);
			box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.18);
		}

		.gate::before { left: 1px; }
		.gate::after { right: 1px; }

		/* Flag panel hanging between the two poles */
		.gate-panel {
			position: absolute;
			top: 6px;
			left: 4px;
			right: 4px;
			height: 22px;
			background: linear-gradient(135deg,
				var(--gate-light) 0%,
				var(--gate-color) 60%,
				var(--gate-deep) 100%);
			clip-path: polygon(0 0, 100% 6%, 100% 78%, 0 92%);
			filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.15));
			animation: flag-flutter 2.4s ease-in-out infinite alternate;
			transform-origin: 0 50%;
		}

		.gate.blue .gate-panel { animation-duration: 3.1s; }

		@keyframes flag-flutter {
			from { transform: skewY(-1.5deg) scaleX(1); }
			to   { transform: skewY(2deg) scaleX(0.97); }
		}

		/* Title and legend */
		.title {
			position: absolute;
			top: 32px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 100;
			font-size: 22px;
			letter-spacing: 0.2em;
			font-weight: 300;
			color: rgba(255, 255, 255, 0.98);
			text-shadow:
				0 2px 8px rgba(0, 0, 0, 0.35),
				0 0 20px rgba(255, 150, 100, 0.1);
			text-transform: uppercase;
			backdrop-filter: blur(4px);
			padding: 8px 24px;
			border-radius: 20px;
			background: rgba(0, 0, 0, 0.08);
		}

		.legend {
			position: absolute;
			bottom: 22px;
			left: 0;
			right: 0;
			text-align: center;
			z-index: 100;
			font-size: 11px;
			color: rgba(255, 255, 255, 0.75);
			letter-spacing: 0.12em;
			text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
			text-transform: uppercase;
		}

		/* ========== SKIER ANIMATIONS ========== */

		.traveler {
			position: absolute;
			left: 50%;
			width: 88px;
			height: 132px;
			margin-left: -44px;
			z-index: 30;
			animation: descend cubic-bezier(0.32, 0.45, 0.42, 0.96) infinite;
			will-change: transform;
			filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.32)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.18));
		}

		@keyframes descend {
			0% {
				bottom: 100%;
				opacity: 0;
				transform: translateX(0) scale(0.4);
			}
			3% {
				opacity: 0.3;
			}
			12% {
				opacity: 1;
			}
			90% {
				opacity: 1;
			}
			100% {
				bottom: -10%;
				opacity: 0;
				transform: translateX(0) scale(1.05);
			}
		}

		.traveler.s1 {
			animation-duration: 11.5s;
			animation-delay: 0s;
			--jacket-light: #ff7a8a;
			--jacket-dark: #c83a46;
			--accent: #ffb3b8;
			--helmet: #1a1410;
			--ski-color: #ffd166;
			--ski-edge: #ffaa33;
			--pant-color: #1d3557;
			--pant-dark: #14263e;
		}

		.traveler.s2 {
			animation-duration: 15.5s;
			animation-delay: -3.5s;
			left: 32%;
			--jacket-light: #ffd9a8;
			--jacket-dark: #ffb84d;
			--accent: #ffe4c4;
			--helmet: #2a1f10;
			--ski-color: #fff5d6;
			--ski-edge: #d4b98a;
			--pant-color: #2a1f3a;
			--pant-dark: #1a1228;
		}

		.traveler.s3 {
			animation-duration: 13.5s;
			animation-delay: -6.8s;
			left: 68%;
			--jacket-light: #5eb8e8;
			--jacket-dark: #1d6aa0;
			--accent: #8ed4ff;
			--helmet: #0a1620;
			--ski-color: #7ed0ff;
			--ski-edge: #3a8aba;
			--pant-color: #0a2540;
			--pant-dark: #051628;
		}

		.traveler.s4 {
			animation-duration: 17.5s;
			animation-delay: -1s;
			left: 46%;
			--jacket-light: #e8ecff;
			--jacket-dark: #b8bcd8;
			--accent: #f0f4ff;
			--helmet: #0f1420;
			--ski-color: #e8ecff;
			--ski-edge: #b0b4d0;
			--pant-color: #1a1f3a;
			--pant-dark: #0e1226;
		}

		/* Turn patterns */
		.turn {
			position: relative;
			width: 100%;
			height: 100%;
			will-change: transform;
			transform-origin: 50% 65%;
		}

		/* Turn patterns - applied to the whole traveler, so gates appear after skier's path */
		.turn.short-turns {
			animation: short-turns 1.2s cubic-bezier(0.32, 0.12, 0.68, 0.88) infinite;
		}

		/* Per-skier phase shifts so turns don't all peak in unison.
		   Delay applies to every per-cycle animation inside the skier so
		   absorb / scarf / head / arms / spray stay coordinated. */
		.s1 .turn,
		.s1 .absorb,
		.s1 .scarf,
		.s1 .head,
		.s1 .arm-front,
		.s1 .arm-back,
		.s1 .spray,
		.s1 .goggle-shine { animation-delay: -0.3s; }
		.s1 .skier-svg { transform: perspective(800px) rotateZ(-6deg) rotateX(2deg); }

		.s2 .turn,
		.s2 .absorb,
		.s2 .scarf,
		.s2 .head,
		.s2 .arm-front,
		.s2 .arm-back,
		.s2 .spray,
		.s2 .goggle-shine { animation-delay: -1.7s; }
		.s2 .skier-svg { transform: perspective(800px) rotateZ(0deg) rotateY(3deg); }

		.s3 .turn,
		.s3 .absorb,
		.s3 .scarf,
		.s3 .head,
		.s3 .arm-front,
		.s3 .arm-back,
		.s3 .spray,
		.s3 .goggle-shine { animation-delay: -0.9s; }
		.s3 .skier-svg { transform: perspective(800px) rotateZ(6deg) rotateX(-2deg); }

		.s4 .turn,
		.s4 .absorb,
		.s4 .scarf,
		.s4 .head,
		.s4 .arm-front,
		.s4 .arm-back,
		.s4 .spray,
		.s4 .goggle-shine { animation-delay: -2.1s; }

		@keyframes short-turns {
			0%   { transform: translateX(-22px) rotate(-8deg); }
			12%  { transform: translateX(-11px) rotate(-4deg); }
			25%  { transform: translateX(0px)   rotate(0deg); }
			38%  { transform: translateX(11px)  rotate(4deg); }
			50%  { transform: translateX(22px)  rotate(8deg); }
			62%  { transform: translateX(11px)  rotate(4deg); }
			75%  { transform: translateX(0px)   rotate(0deg); }
			88%  { transform: translateX(-11px) rotate(-4deg); }
			100% { transform: translateX(-22px) rotate(-8deg); }
		}

		.turn.carving {
			animation: carving 4.4s cubic-bezier(0.33, 0.08, 0.67, 0.93) infinite;
		}

		@keyframes carving {
			0%   { transform: translateX(-150px) rotate(-13deg); }
			25%  { transform: translateX(-75px)  rotate(-6.5deg); }
			50%  { transform: translateX(150px)  rotate(13deg); }
			75%  { transform: translateX(75px)   rotate(6.5deg); }
			100% { transform: translateX(-150px) rotate(-13deg); }
		}

		.turn.medium-turns {
			animation: medium-turns 2.4s cubic-bezier(0.36, 0.12, 0.64, 0.88) infinite;
		}

		@keyframes medium-turns {
			0%   { transform: translateX(-85px) rotate(-10deg); }
			25%  { transform: translateX(-42px) rotate(-5deg); }
			50%  { transform: translateX(85px)  rotate(10deg); }
			75%  { transform: translateX(42px)  rotate(5deg); }
			100% { transform: translateX(-85px) rotate(-10deg); }
		}

		/* Compression/extension in the skier's body during turns */
		.absorb {
			position: relative;
			width: 100%;
			height: 100%;
			will-change: transform;
			transform-origin: 50% 50%;
		}

		.short-turns .absorb {
			animation: absorb-short 1.2s cubic-bezier(0.32, 0.12, 0.68, 0.88) infinite;
		}

		.carving .absorb {
			animation: absorb-carving 4.4s cubic-bezier(0.33, 0.08, 0.67, 0.93) infinite;
		}

		.medium-turns .absorb {
			animation: absorb-medium 2.4s cubic-bezier(0.36, 0.12, 0.64, 0.88) infinite;
		}

		@keyframes absorb-short {
			0%   { transform: scaleY(1) scaleX(1.01) translateY(0); }
			25%  { transform: scaleY(0.96) scaleX(1.0) translateY(1px); }
			50%  { transform: scaleY(0.88) scaleX(0.98) translateY(2.5px); }
			75%  { transform: scaleY(0.96) scaleX(1.0) translateY(1px); }
			100% { transform: scaleY(1) scaleX(1.01) translateY(0); }
		}

		@keyframes absorb-medium {
			0%   { transform: scaleY(1) scaleX(1.01) translateY(0); }
			25%  { transform: scaleY(0.97) scaleX(1.0) translateY(0.8px); }
			50%  { transform: scaleY(0.90) scaleX(0.98) translateY(2px); }
			75%  { transform: scaleY(0.97) scaleX(1.0) translateY(0.8px); }
			100% { transform: scaleY(1) scaleX(1.01) translateY(0); }
		}

		@keyframes absorb-carving {
			0%   { transform: scaleY(1) scaleX(1.01) translateY(0); }
			25%  { transform: scaleY(0.96) scaleX(1.0) translateY(1.2px); }
			50%  { transform: scaleY(0.85) scaleX(0.97) translateY(3px); }
			75%  { transform: scaleY(0.96) scaleX(1.0) translateY(1.2px); }
			100% { transform: scaleY(1) scaleX(1.01) translateY(0); }
		}

		/* Skier SVG */
		.skier-svg {
			position: absolute;
			left: 50%;
			top: 50%;
			width: 100%;
			height: 100%;
			margin-left: -50%;
			margin-top: -50%;
		}

		/* Arms with pole plants */
		.arm-front {
			transform-origin: 50% 32%;
			will-change: transform;
		}

		.short-turns .arm-front {
			animation: pole-plant-short 1.2s cubic-bezier(0.32, 0.12, 0.68, 0.88) infinite;
		}

		.carving .arm-front {
			animation: pole-plant-carving 4.4s cubic-bezier(0.33, 0.08, 0.67, 0.93) infinite;
		}

		.medium-turns .arm-front {
			animation: pole-plant-medium 2.4s cubic-bezier(0.36, 0.12, 0.64, 0.88) infinite;
		}

		@keyframes pole-plant-short {
			0%   { transform: rotate(0deg); }
			30%  { transform: rotate(0deg); }
			40%  { transform: rotate(2deg); }
			48%  { transform: rotate(4deg); }
			56%  { transform: rotate(2deg); }
			68%  { transform: rotate(0deg); }
			100% { transform: rotate(0deg); }
		}

		@keyframes pole-plant-medium {
			0%   { transform: rotate(0deg); }
			35%  { transform: rotate(0deg); }
			42%  { transform: rotate(1.5deg); }
			48%  { transform: rotate(3deg); }
			54%  { transform: rotate(1.5deg); }
			65%  { transform: rotate(0deg); }
			100% { transform: rotate(0deg); }
		}

		@keyframes pole-plant-carving {
			0%   { transform: rotate(0deg); }
			38%  { transform: rotate(0deg); }
			45%  { transform: rotate(1deg); }
			50%  { transform: rotate(2deg); }
			55%  { transform: rotate(1deg); }
			62%  { transform: rotate(0deg); }
			100% { transform: rotate(0deg); }
		}

		.arm-back {
			transform-origin: 50% 32%;
			will-change: transform;
		}

		.short-turns .arm-back {
			animation: arm-back-short 1.2s cubic-bezier(0.32, 0.12, 0.68, 0.88) infinite;
		}

		.carving .arm-back {
			animation: arm-back-carving 4.4s cubic-bezier(0.33, 0.08, 0.67, 0.93) infinite;
		}

		.medium-turns .arm-back {
			animation: arm-back-medium 2.4s cubic-bezier(0.36, 0.12, 0.64, 0.88) infinite;
		}

		@keyframes arm-back-short {
			0%   { transform: rotate(-2deg); }
			6%   { transform: rotate(-4deg); }
			14%  { transform: rotate(-2deg); }
			25%  { transform: rotate(0deg); }
			85%  { transform: rotate(0deg); }
			92%  { transform: rotate(-2deg); }
			98%  { transform: rotate(-4deg); }
			100% { transform: rotate(-2deg); }
		}

		@keyframes arm-back-medium {
			0%   { transform: rotate(-1.5deg); }
			5%   { transform: rotate(-3deg); }
			12%  { transform: rotate(-1.5deg); }
			22%  { transform: rotate(0deg); }
			88%  { transform: rotate(0deg); }
			94%  { transform: rotate(-1.5deg); }
			99%  { transform: rotate(-3deg); }
			100% { transform: rotate(-1.5deg); }
		}

		@keyframes arm-back-carving {
			0%   { transform: rotate(-1deg); }
			5%   { transform: rotate(-2deg); }
			10%  { transform: rotate(-1deg); }
			18%  { transform: rotate(0deg); }
			88%  { transform: rotate(0deg); }
			95%  { transform: rotate(-1deg); }
			99%  { transform: rotate(-2deg); }
			100% { transform: rotate(-1deg); }
		}

		/* Scarf flutter with wind simulation */
		.scarf {
			transform-origin: 48% 38%;
			will-change: transform;
		}

		.short-turns .scarf {
			animation: scarf-flutter 1.2s ease-in-out infinite;
		}

		.carving .scarf {
			animation: scarf-flutter 4.4s ease-in-out infinite;
		}

		.medium-turns .scarf {
			animation: scarf-flutter 2.4s ease-in-out infinite;
		}

		@keyframes scarf-flutter {
			0%   { transform: rotate(0deg) translateX(0) translateY(-1px); }
			20%  { transform: rotate(-4deg) translateX(1px) translateY(0px); }
			40%  { transform: rotate(-10deg) translateX(2px) translateY(1px); }
			50%  { transform: rotate(-12deg) translateX(2.2px) translateY(1.2px); }
			60%  { transform: rotate(-8deg) translateX(1.8px) translateY(0.8px); }
			80%  { transform: rotate(-2deg) translateX(0.5px) translateY(-0.5px); }
			100% { transform: rotate(0deg) translateX(0) translateY(-1px); }
		}

		/* Snow spray */
		.spray {
			will-change: transform;
		}

		.short-turns .spray {
			animation: spray-pulse 1.2s ease-in-out infinite;
		}

		.carving .spray {
			animation: spray-pulse 4.4s ease-in-out infinite;
		}

		.medium-turns .spray {
			animation: spray-pulse 2.4s ease-in-out infinite;
		}

		@keyframes spray-pulse {
			0%   { transform: scaleX(0.95) scaleY(1.05); opacity: 0.5; }
			20%  { transform: scaleX(1.0) scaleY(0.95); opacity: 0.65; }
			40%  { transform: scaleX(1.2) scaleY(0.85); opacity: 0.85; }
			50%  { transform: scaleX(1.25) scaleY(0.82); opacity: 0.9; }
			60%  { transform: scaleX(1.15) scaleY(0.88); opacity: 0.8; }
			80%  { transform: scaleX(1.0) scaleY(1.0); opacity: 0.6; }
			100% { transform: scaleX(0.95) scaleY(1.05); opacity: 0.45; }
		}

		/* Head tilt and look direction */
		.head {
			will-change: transform;
		}

		.short-turns .head {
			animation: head-tilt 1.2s cubic-bezier(0.32, 0.12, 0.68, 0.88) infinite;
		}

		.carving .head {
			animation: head-tilt 4.4s cubic-bezier(0.33, 0.08, 0.67, 0.93) infinite;
		}

		.medium-turns .head {
			animation: head-tilt 2.4s cubic-bezier(0.36, 0.12, 0.64, 0.88) infinite;
		}

		@keyframes head-tilt {
			0%   { transform: rotate(0deg) translateY(0); }
			12%  { transform: rotate(3deg) translateY(-0.4px); }
			25%  { transform: rotate(6deg) translateY(-0.8px); }
			37%  { transform: rotate(3deg) translateY(-0.4px); }
			50%  { transform: rotate(0deg) translateY(0); }
			62%  { transform: rotate(-3deg) translateY(-0.4px); }
			75%  { transform: rotate(-6deg) translateY(-0.8px); }
			87%  { transform: rotate(-3deg) translateY(-0.4px); }
			100% { transform: rotate(0deg) translateY(0); }
		}

		/* Goggle glint */
		.goggle-shine {
			will-change: opacity;
		}

		.short-turns .goggle-shine {
			animation: glint 1.2s ease-in-out infinite;
		}

		.carving .goggle-shine {
			animation: glint 4.4s ease-in-out infinite;
		}

		.medium-turns .goggle-shine {
			animation: glint 2.4s ease-in-out infinite;
		}

		@keyframes glint {
			0%, 15%, 85%, 100% { opacity: 0.3; }
			35%, 50%, 65% { opacity: 0.75; }
		}

	</style>
</head>
<body>
	<div class="scene">
		<div class="stars"></div>
		<div class="sun"></div>
		<div class="rays"></div>
		<div class="haze"></div>

		<!-- Far mountains (lavender, hazy) -->
		<svg class="mountains far" viewBox="0 0 1600 300" preserveAspectRatio="none">
			<defs>
				<linearGradient id="gradFar" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#d4b5e0"/>
					<stop offset="60%" stop-color="#9080a8"/>
					<stop offset="100%" stop-color="#5a5a7a"/>
				</linearGradient>
				<linearGradient id="snowFar" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#ffffff"/>
					<stop offset="100%" stop-color="#f0e8ff"/>
				</linearGradient>
			</defs>
			<path fill="url(#gradFar)" d="M0,300 L0,220 L140,130 L240,175 L360,75 L520,160 L680,95 L820,170 L940,105 L1080,190 L1200,130 L1360,175 L1600,110 L1600,300 Z"/>
			<path fill="url(#snowFar)" opacity="0.55" d="M140,130 L240,175 L180,155 L140,130 M360,75 L520,160 L440,115 L360,75 M680,95 L820,170 L750,130 L680,95 M940,105 L1080,190 L1010,145 L940,105 M1200,130 L1360,175 L1280,152 L1200,130"/>
		</svg>

		<!-- Mid mountains (purple, clearer) -->
		<svg class="mountains mid" viewBox="0 0 1600 300" preserveAspectRatio="none">
			<defs>
				<linearGradient id="gradMid" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#7a5a9a"/>
					<stop offset="50%" stop-color="#5a3a7a"/>
					<stop offset="100%" stop-color="#3a2a5a"/>
				</linearGradient>
				<linearGradient id="snowMid" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#ffffff"/>
					<stop offset="100%" stop-color="#f2eaff"/>
				</linearGradient>
			</defs>
			<path fill="url(#gradMid)" d="M0,300 L0,190 L120,90 L280,135 L420,60 L580,125 L740,85 L900,150 L1040,100 L1200,165 L1360,115 L1600,170 L1600,300 Z"/>
			<path fill="url(#snowMid)" opacity="0.5" d="M120,90 L280,135 L200,110 L120,90 M420,60 L580,125 L500,92 L420,60 M740,85 L900,150 L820,115 L740,85 M1040,100 L1200,165 L1120,130 L1040,100"/>
		</svg>

		<!-- Near mountains (dark silhouettes) -->
		<svg class="mountains near" viewBox="0 0 1600 300" preserveAspectRatio="none">
			<defs>
				<linearGradient id="gradNear" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#2a4a7a"/>
					<stop offset="100%" stop-color="#0a1a3a"/>
				</linearGradient>
				<linearGradient id="snowNear" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#ffffff"/>
					<stop offset="100%" stop-color="#f9f9ff"/>
				</linearGradient>
			</defs>
			<path fill="url(#gradNear)" d="M0,300 L0,150 L100,70 L260,115 L380,35 L540,105 L680,70 L840,135 L960,85 L1120,150 L1280,105 L1450,155 L1600,115 L1600,300 Z"/>
			<path fill="url(#snowNear)" opacity="0.42" d="M100,70 L260,115 L180,92 L100,70 M380,35 L540,105 L460,70 L380,35 M680,70 L840,135 L760,102 L680,70 M960,85 L1120,150 L1040,117 L960,85"/>
		</svg>

		<!-- Chairlift in the distance, gliding above the trees -->
		<svg class="chairlift" viewBox="0 0 480 220" preserveAspectRatio="xMaxYMax meet">
			<defs>
				<linearGradient id="towerGrad" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#243a55"/>
					<stop offset="100%" stop-color="#0a141f"/>
				</linearGradient>
			</defs>

			<!-- Cable arc descending from upper-left to lower-right -->
			<path d="M0,28 Q240,56 480,140" stroke="#1a2230" stroke-width="0.9" fill="none" opacity="0.85"/>

			<!-- Tower 1 (back) -->
			<g class="tower">
				<line x1="120" y1="220" x2="120" y2="42" stroke="url(#towerGrad)" stroke-width="2"/>
				<line x1="100" y1="44" x2="140" y2="44" stroke="url(#towerGrad)" stroke-width="1.6"/>
				<circle cx="100" cy="44" r="1.4" fill="#243a55"/>
				<circle cx="140" cy="44" r="1.4" fill="#243a55"/>
				<polygon points="118,42 122,42 120,38" fill="#243a55"/>
			</g>

			<!-- Tower 2 (front) -->
			<g class="tower">
				<line x1="340" y1="220" x2="340" y2="100" stroke="url(#towerGrad)" stroke-width="2.2"/>
				<line x1="318" y1="102" x2="362" y2="102" stroke="url(#towerGrad)" stroke-width="1.8"/>
				<circle cx="318" cy="102" r="1.6" fill="#243a55"/>
				<circle cx="362" cy="102" r="1.6" fill="#243a55"/>
				<polygon points="338,100 342,100 340,96" fill="#243a55"/>
			</g>

			<!-- Chairs hanging at fixed points along the cable, each gently swaying -->
			<g transform="translate(60, 36)"><g class="chair-swing">
				<line x1="0" y1="0" x2="0" y2="9" stroke="#1a2230" stroke-width="0.8"/>
				<rect x="-5" y="9" width="10" height="2.2" fill="#3a2a1a" rx="0.4"/>
				<rect x="-5" y="11.2" width="10" height="1.8" fill="#241510" rx="0.3"/>
				<line x1="-5" y1="9" x2="-5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
				<line x1="5" y1="9" x2="5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
			</g></g>
			<g transform="translate(180, 56)"><g class="chair-swing s-2">
				<line x1="0" y1="0" x2="0" y2="9" stroke="#1a2230" stroke-width="0.8"/>
				<rect x="-5" y="9" width="10" height="2.2" fill="#3a2a1a" rx="0.4"/>
				<rect x="-5" y="11.2" width="10" height="1.8" fill="#241510" rx="0.3"/>
				<line x1="-5" y1="9" x2="-5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
				<line x1="5" y1="9" x2="5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
			</g></g>
			<g transform="translate(280, 80)"><g class="chair-swing s-3">
				<line x1="0" y1="0" x2="0" y2="9" stroke="#1a2230" stroke-width="0.8"/>
				<rect x="-5" y="9" width="10" height="2.2" fill="#3a2a1a" rx="0.4"/>
				<rect x="-5" y="11.2" width="10" height="1.8" fill="#241510" rx="0.3"/>
				<line x1="-5" y1="9" x2="-5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
				<line x1="5" y1="9" x2="5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
			</g></g>
			<g transform="translate(390, 112)"><g class="chair-swing s-4">
				<line x1="0" y1="0" x2="0" y2="9" stroke="#1a2230" stroke-width="0.8"/>
				<rect x="-5" y="9" width="10" height="2.2" fill="#3a2a1a" rx="0.4"/>
				<rect x="-5" y="11.2" width="10" height="1.8" fill="#241510" rx="0.3"/>
				<line x1="-5" y1="9" x2="-5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
				<line x1="5" y1="9" x2="5" y2="14" stroke="#1a2230" stroke-width="0.6"/>
			</g></g>
		</svg>

		<!-- Pine forest silhouette: trees populated by JS for natural randomness -->
		<svg class="forest" viewBox="0 0 1600 100" preserveAspectRatio="none">
			<defs>
				<linearGradient id="treeFade" x1="0" x2="0" y1="0" y2="1">
					<stop offset="0%" stop-color="#1a3a5a"/>
					<stop offset="100%" stop-color="#050a15"/>
				</linearGradient>
			</defs>
			<rect x="0" y="92" width="1600" height="8" fill="url(#treeFade)"/>
			<g id="forest-trees" fill="url(#treeFade)"></g>
		</svg>

		<!-- Snow and slope -->
		<div class="slope">
			<!-- Static ski tracks left by prior runs: subtle paired curves down the slope -->
			<svg class="ski-tracks" viewBox="0 0 1000 600" preserveAspectRatio="none">
				<defs>
					<linearGradient id="trackFade" x1="0" x2="0" y1="0" y2="1">
						<stop offset="0%" stop-color="rgba(120, 150, 190, 0)"/>
						<stop offset="35%" stop-color="rgba(120, 150, 190, 0.45)"/>
						<stop offset="100%" stop-color="rgba(80, 120, 170, 0.7)"/>
					</linearGradient>
				</defs>
				<g stroke="url(#trackFade)" stroke-width="1.6" fill="none" stroke-linecap="round">
					<!-- Track pair 1: gentle S down the left -->
					<path d="M 220,40 Q 180,160 240,260 Q 300,370 220,500 Q 180,560 200,600"/>
					<path d="M 234,40 Q 194,160 254,260 Q 314,370 234,500 Q 194,560 214,600"/>
					<!-- Track pair 2: wider sweep right side -->
					<path d="M 660,30 Q 720,140 640,250 Q 560,360 700,470 Q 760,540 720,600"/>
					<path d="M 674,30 Q 734,140 654,250 Q 574,360 714,470 Q 774,540 734,600"/>
					<!-- Track pair 3: tight short turns center -->
					<path d="M 460,60 Q 430,120 480,180 Q 530,240 460,300 Q 410,360 480,420 Q 540,480 470,560"/>
					<path d="M 472,60 Q 442,120 492,180 Q 542,240 472,300 Q 422,360 492,420 Q 552,480 482,560"/>
					<!-- Track pair 4: long carving arc -->
					<path d="M 880,40 Q 820,200 900,360 Q 970,500 880,600"/>
					<path d="M 892,40 Q 832,200 912,360 Q 982,500 892,600"/>
				</g>
			</svg>

			<div class="flags">
				<div class="gate"      style="left: 19%; top: 4%;  transform: scale(0.6);"><div class="gate-panel"></div></div>
				<div class="gate blue" style="left: 63%; top: 14%; transform: scale(0.7);"><div class="gate-panel"></div></div>
				<div class="gate"      style="left: 38%; top: 23%; transform: scale(0.78);"><div class="gate-panel"></div></div>
				<div class="gate blue" style="left: 14%; top: 33%; transform: scale(0.85);"><div class="gate-panel"></div></div>
				<div class="gate"      style="left: 75%; top: 44%; transform: scale(0.92);"><div class="gate-panel"></div></div>
				<div class="gate blue" style="left: 30%; top: 56%; transform: scale(1);"><div class="gate-panel"></div></div>
				<div class="gate"      style="left: 60%; top: 68%; transform: scale(1.1);"><div class="gate-panel"></div></div>
				<div class="gate blue" style="left: 16%; top: 80%; transform: scale(1.2);"><div class="gate-panel"></div></div>
			</div>

			<!-- Skier 1: red jacket, short turns -->
			<div class="traveler s1">
				<div class="turn short-turns">
					<div class="absorb">
						<svg class="skier-svg" viewBox="-32 0 64 128" preserveAspectRatio="xMidYMid meet" overflow="visible">
							<defs>
								<filter id="blur"><feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/></filter>
							</defs>

							<!-- Snow spray -->
							<ellipse class="spray" cx="0" cy="108" rx="24" ry="5" fill="white" opacity="0.82" filter="url(#blur)"/>

							<!-- Skis: long racing skis with curved upturned tips -->
							<g class="skis">
								<!-- Left ski: long with dramatic upturned tip pointing forward (down-slope) -->
								<path d="M-30,103 Q-32,101 -30,105 Q-28,107 -22,107 L4,108 Q8,108 8,109.5 Q8,111 4,111 L-22,110 Q-28,110 -30,108 Q-32,107 -30,103 Z"
									fill="var(--ski-color)" stroke="var(--ski-edge)" stroke-width="0.4" opacity="0.95"/>
								<!-- Top edge highlight -->
								<line x1="-26" y1="108" x2="6" y2="108.5" stroke="rgba(255,255,255,0.7)" stroke-width="0.4"/>
								<!-- Ski tip detail (front upturn) -->
								<path d="M-30,103 Q-32,102 -31,105 L-28,106 Q-29,104 -30,103 Z" fill="var(--ski-edge)" opacity="0.6"/>
								<!-- Boot binding -->
								<rect x="-13" y="100" width="9" height="6" fill="#2a1810" rx="0.5" stroke="#1a0e08" stroke-width="0.2"/>
								<rect x="-12.5" y="100.5" width="8" height="2" fill="#3d2818" rx="0.3"/>

								<!-- Right ski: long with dramatic upturned tip -->
								<path d="M-4,109 L24,108 Q30,108 32,106 Q33,103 31,105 Q29,107 24,107 L-4,108 Q-8,108 -8,109.5 Q-8,111 -4,111 Z"
									fill="var(--ski-color)" stroke="var(--ski-edge)" stroke-width="0.4" opacity="0.95"/>
								<!-- Top edge highlight -->
								<line x1="-2" y1="109" x2="28" y2="108" stroke="rgba(255,255,255,0.7)" stroke-width="0.4"/>
								<!-- Ski tip detail (front upturn) -->
								<path d="M32,106 Q33,103 31,105 L28,107 Q30,107 32,106 Z" fill="var(--ski-edge)" opacity="0.6"/>
								<!-- Boot binding -->
								<rect x="4" y="102" width="9" height="6" fill="#2a1810" rx="0.5" stroke="#1a0e08" stroke-width="0.2"/>
								<rect x="4.5" y="102.5" width="8" height="2" fill="#3d2818" rx="0.3"/>
							</g>

							<!-- Shins/Lower legs: aggressively bent, weight forward -->
							<g class="shins">
								<!-- Left shin: steep angle showing deep bend -->

	<script>
		(function generateForest() {
			const group = document.getElementById('forest-trees');
			if (!group) return;

			let seed = 1337;
			const rand = () => {
				seed = (seed * 16807) % 2147483647;
				return seed / 2147483647;
			};

			const NS = 'http://www.w3.org/2000/svg';
			const baseline = 95;
			const totalWidth = 1600;
			let x = -4;
			let i = 0;

			while (x < totalWidth + 8) {
				const heightTier = rand();
				let h;
				if (heightTier < 0.18) h = 16 + rand() * 8;
				else if (heightTier < 0.55) h = 26 + rand() * 12;
				else if (heightTier < 0.85) h = 38 + rand() * 14;
				else h = 52 + rand() * 12;

				const w = 5 + rand() * 6;

				const tree = document.createElementNS(NS, 'polygon');
				tree.setAttribute('points',
					`${(x - w / 2).toFixed(1)},${baseline} ` +
					`${x.toFixed(1)},${(baseline - h).toFixed(1)} ` +
					`${(x + w / 2).toFixed(1)},${baseline}`
				);
				group.appendChild(tree);

				const spacing = 3 + rand() * 16;
				const cluster = rand() < 0.18 ? -2 : 0;
				x += spacing + cluster;
				i++;
				if (i > 400) break;
			}
		})();
	</script>
