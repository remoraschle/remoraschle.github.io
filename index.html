<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<title>remoraschle.github.io</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		html, body {
			height: 100%;
			overflow: hidden;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}

		.scene {
			position: relative;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: linear-gradient(180deg,
				#050a1f 0%,
				#0f1535 8%,
				#1a1548 14%,
				#2d1a5a 20%,
				#4a2555 28%,
				#7a3a5a 38%,
				#b84a4a 48%,
				#d86a3a 56%,
				#f09a4a 62%,
				#ffc060 68%,
				#ffe8a0 74%,
				#f0e4d8 80%,
				#e8f0f8 88%,
				#ffffff 100%
			);
		}

		/* God rays / crepuscular rays from sun */
		.rays {
			position: absolute;
			top: 0;
			left: 50%;
			width: 100%;
			height: 100%;
			margin-left: -50%;
			pointer-events: none;
			z-index: 2;
			background:
				repeating-linear-gradient(
					15deg,
					transparent 0,
					transparent 80px,
					rgba(255, 200, 100, 0.04) 80px,
					rgba(255, 200, 100, 0.04) 160px
				),
				repeating-linear-gradient(
					-12deg,
					transparent 0,
					transparent 100px,
					rgba(255, 180, 80, 0.03) 100px,
					rgba(255, 180, 80, 0.03) 200px
				);
			opacity: 0.6;
			animation: rays-shimmer 8s ease-in-out infinite;
		}

		@keyframes rays-shimmer {
			0%, 100% { opacity: 0.5; }
			50% { opacity: 0.75; }
		}

		/* Atmospheric haze layers */
		.haze {
			position: absolute;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 3;
		}

		.haze::before {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 35%;
			background: radial-gradient(ellipse at 50% -50%, rgba(255,200,100,0.15) 0%, transparent 60%);
			opacity: 0.8;
		}

		.haze::after {
			content: "";
			position: absolute;
			top: 45%;
			left: 0;
			width: 100%;
			height: 30%;
			background: linear-gradient(180deg, rgba(255,220,180,0.08) 0%, rgba(200,180,160,0.04) 100%);
		}

		/* Stars in night sky */
		.stars {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 45%;
			pointer-events: none;
			z-index: 1;
		}

		.stars::before,
		.stars::after {
			content: "";
			position: absolute;
			width: 100%;
			height: 100%;
			background-image:
				radial-gradient(1.5px 1.5px at 8% 12%, rgba(255,255,255,0.95), transparent),
				radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1.5px 1.5px at 42% 18%, rgba(255,255,255,0.9), transparent),
				radial-gradient(1px 1px at 62% 6%, rgba(255,255,255,0.7), transparent),
				radial-gradient(2px 2px at 78% 14%, rgba(255,255,255,0.85), transparent),
				radial-gradient(1px 1px at 90% 4%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1.5px 1.5px at 15% 35%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.7), transparent),
				radial-gradient(1px 1px at 35% 40%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1.5px 1.5px at 88% 28%, rgba(255,255,255,0.8), transparent);
			background-size: 100% 100%;
			background-repeat: no-repeat;
			animation: twinkle 4s ease-in-out infinite;
		}

		.stars::after {
			animation: twinkle 5.5s ease-in-out infinite reverse;
			opacity: 0.6;
		}

		@keyframes twinkle {
			0%, 100% { opacity: 0.4; }
			50% { opacity: 0.8; }
		}

		/* Sun glow and corona */
		.sun {
			position: absolute;
			top: 50%;
			left: 50%;
			width: 380px;
			height: 380px;
			margin-left: -190px;
			margin-top: -190px;
			pointer-events: none;
			z-index: 1;
		}

		.sun::before {
			content: "";
			position: absolute;
			inset: 0;
			border-radius: 50%;
			background: radial-gradient(circle,
				rgba(255, 250, 230, 1) 0%,
				rgba(255, 240, 200, 0.8) 8%,
				rgba(255, 200, 100, 0.5) 18%,
				rgba(255, 160, 80, 0.25) 32%,
				rgba(255, 120, 60, 0.08) 50%,
				transparent 70%
			);
			filter: blur(2px);
			animation: sun-glow 5s ease-in-out infinite;
		}

		.sun::after {
			content: "";
			position: absolute;
			inset: -20px;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(255, 180, 100, 0.15) 0%, transparent 60%);
			filter: blur(8px);
			animation: sun-corona 7s ease-in-out infinite reverse;
		}

		@keyframes sun-glow {
			0%, 100% { transform: scale(1) translateY(0); opacity: 0.9; }
			50% { transform: scale(1.08) translateY(-6px); opacity: 1; }
		}

		@keyframes sun-corona {
			0%, 100% { transform: scale(1); opacity: 0.5; }
			50% { transform: scale(1.15); opacity: 0.7; }
		}

		/* Mountain layers with sophisticated gradients */
		.mountains {
			position: absolute;
			left: 0;
			width: 100%;
			pointer-events: none;
			z-index: 4;
		}

		.mountains.far {
			bottom: 47%;
			height: 30%;
			opacity: 0.45;
			filter: blur(1.5px);
		}

		.mountains.mid {
			bottom: 45%;
			height: 28%;
			opacity: 0.7;
			filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
		}

		.mountains.near {
			bottom: 43%;
			height: 26%;
			opacity: 1;
			filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.2));
		}

		/* Pine forest silhouette */
		.forest {
			position: absolute;
			bottom: 43%;
			left: 0;
			width: 100%;
			height: 20%;
			pointer-events: none;
			z-index: 5;
			opacity: 0.9;
			filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
		}

		/* Slope area */
		.slope {
			position: absolute;
			bottom: 0;
			left: 0;
			width: 100%;
			height: 57%;
			overflow: hidden;
			background: linear-gradient(180deg,
				rgba(250, 252, 255, 0.6) 0%,
				rgba(255, 255, 255, 0.85) 20%,
				rgba(255, 255, 255, 0.95) 50%,
				rgba(250, 250, 255, 1) 100%
			);
			box-shadow: inset 0 -40px 60px rgba(0, 0, 0, 0.08);
		}

		/* Slope texture: subtle diagonal patterns */
		.slope::before {
			content: "";
			position: absolute;
			inset: 0;
			background-image:
				repeating-linear-gradient(
					90deg,
					transparent 0,
					transparent 140px,
					rgba(150, 180, 220, 0.05) 140px,
					rgba(150, 180, 220, 0.05) 142px
				),
				repeating-linear-gradient(
					35deg,
					transparent 0,
					transparent 300px,
					rgba(200, 200, 240, 0.03) 300px,
					rgba(200, 200, 240, 0.03) 302px
				),
				radial-gradient(ellipse 500px 300px at 50% -100px,
					rgba(255, 200, 100, 0.06) 0%,
					transparent 100%
				);
			pointer-events: none;
			z-index: 1;
		}

		/* Falling snow: multi-layer parallax */
		.snowfall {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 50;
		}

		.snowfall::before {
			content: "";
			position: absolute;
			width: 100%;
			height: 130%;
			background-image:
				radial-gradient(1.5px 1.5px at 5% 15%, rgba(255,255,255,0.95), transparent),
				radial-gradient(1.5px 1.5px at 18% 40%, rgba(255,255,255,0.88), transparent),
				radial-gradient(1px 1px at 35% 20%, rgba(255,255,255,0.9), transparent),
				radial-gradient(2px 2px at 50% 60%, rgba(255,255,255,0.85), transparent),
				radial-gradient(1px 1px at 68% 35%, rgba(255,255,255,0.92), transparent),
				radial-gradient(1.5px 1.5px at 82% 55%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1px 1px at 25% 75%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1.5px 1.5px at 75% 15%, rgba(255,255,255,0.85), transparent);
			background-size: 100% 100%;
			background-repeat: repeat;
			animation: snow-fall-slow 10s linear infinite;
		}

		.snowfall::after {
			content: "";
			position: absolute;
			width: 100%;
			height: 130%;
			background-image:
				radial-gradient(1px 1px at 12% 25%, rgba(255,255,255,0.85), transparent),
				radial-gradient(1.5px 1.5px at 45% 50%, rgba(255,255,255,0.8), transparent),
				radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.9), transparent),
				radial-gradient(1.5px 1.5px at 30% 55%, rgba(255,255,255,0.75), transparent),
				radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,0.82), transparent);
			background-size: 100% 100%;
			background-repeat: repeat;
			opacity: 0.7;
			animation: snow-fall-medium 7s linear infinite;
			filter: blur(0.3px);
		}

		@keyframes snow-fall-slow {
			0% { transform: translateY(-100%); }
			100% { transform: translateY(100%); }
		}

		@keyframes snow-fall-medium {
			0% { transform: translateY(-100%) translateX(-2px); }
			100% { transform: translateY(100%) translateX(2px); }
		}

		/* Slalom flags */
		.flags {
			position: absolute;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 5;
		}

		.flag {
			position: absolute;
			width: 3.5px;
			height: 58px;
			background: linear-gradient(180deg, #7a5a3a 0%, #5a3a2a 100%);
			filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
		}

		.flag::after {
			content: "";
			position: absolute;
			top: 4px;
			left: 3.5px;
			width: 28px;
			height: 18px;
			background: linear-gradient(135deg, #ff4444 0%, #e63946 100%);
			clip-path: polygon(0 0, 100% 5%, 95% 100%, 0 70%);
			filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.15));
		}

		.flag.blue::after {
			background: linear-gradient(135deg, #3d9cff 0%, #1d6fd1 100%);
		}

		/* Title and legend */
		.title {
			position: absolute;
			top: 32px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 100;
			font-size: 22px;
			letter-spacing: 0.2em;
			font-weight: 300;
			color: rgba(255, 255, 255, 0.98);
			text-shadow:
				0 2px 8px rgba(0, 0, 0, 0.35),
				0 0 20px rgba(255, 150, 100, 0.1);
			text-transform: uppercase;
			backdrop-filter: blur(4px);
			padding: 8px 24px;
			border-radius: 20px;
			background: rgba(0, 0, 0, 0.08);
		}

		.legend {
			position: absolute;
			bottom: 22px;
			left: 0;
			right: 0;
			text-align: center;
			z-index: 100;
			font-size: 11px;
			color: rgba(255, 255, 255, 0.75);
			letter-spacing: 0.12em;
			text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
			text-transform: uppercase;
		}

		/* ========== SKIER ANIMATIONS ========== */

		.traveler {
			position: absolute;
			left: 50%;
			width: 88px;
			height: 132px;
			margin-left: -44px;
			z-index: 30;
			animation: descend linear infinite;
			will-change: transform;
			filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.25));
		}

		@keyframes descend {
			0% {
				bottom: 115%;
				opacity: 0;
				transform: translateX(0) scale(0.28);
			}
			4% {
				opacity: 1;
			}
			100% {
				bottom: -15%;
				opacity: 0;
				transform: translateX(0) scale(1.3);
			}
		}

		.traveler.s1 {
			animation-duration: 11.5s;
			animation-delay: 0s;
			--jacket-light: #ff7a8a;
			--jacket-dark: #c83a46;
			--accent: #ffb3b8;
			--helmet: #1a1410;
		}

		.traveler.s2 {
			animation-duration: 15.5s;
			animation-delay: -3.5s;
			left: 32%;
			--jacket-light: #ffd9a8;
			--jacket-dark: #ffb84d;
			--accent: #ffe4c4;
			--helmet: #2a1f10;
		}

		.traveler.s3 {
			animation-duration: 13.5s;
			animation-delay: -6.8s;
			left: 68%;
			--jacket-light: #5eb8e8;
			--jacket-dark: #1d6aa0;
			--accent: #8ed4ff;
			--helmet: #0a1620;
		}

		.traveler.s4 {
			animation-duration: 17.5s;
			animation-delay: -1s;
			left: 46%;
			--jacket-light: #e8ecff;
			--jacket-dark: #d4d8ff;
			--accent: #f0f4ff;
			--helmet: #0f1420;
		}

		/* Turn patterns */
		.turn {
			position: relative;
			width: 100%;
			height: 100%;
			will-change: transform;
			transform-origin: 50% 65%;
		}

		.turn.short-turns {
			animation: short-turns 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
		}

		@keyframes short-turns {
			0%   { transform: translateX(-36px) rotate(-18deg); }
			25%  { transform: translateX(0px)   rotate(0deg); }
			50%  { transform: translateX(36px)  rotate(18deg); }
			75%  { transform: translateX(0px)   rotate(0deg); }
			100% { transform: translateX(-36px) rotate(-18deg); }
		}

		.turn.carving {
			animation: carving 4.4s cubic-bezier(0.42, 0, 0.58, 1) infinite;
		}

		@keyframes carving {
			0%   { transform: translateX(-22vw) rotate(-30deg); }
			50%  { transform: translateX(22vw)  rotate(30deg); }
			100% { transform: translateX(-22vw) rotate(-30deg); }
		}

		.turn.medium-turns {
			animation: medium-turns 2.4s cubic-bezier(0.43, 0.13, 0.57, 0.87) infinite;
		}

		@keyframes medium-turns {
			0%   { transform: translateX(-13vw) rotate(-24deg); }
			50%  { transform: translateX(13vw)  rotate(24deg); }
			100% { transform: translateX(-13vw) rotate(-24deg); }
		}

		/* Compression/extension wrapper */
		.absorb {
			position: relative;
			width: 100%;
			height: 100%;
			will-change: transform;
			transform-origin: 50% 50%;
		}

		.short-turns .absorb {
			animation: absorb-short 0.6s ease-in-out infinite alternate;
		}

		.carving .absorb {
			animation: absorb-carving 2.2s ease-in-out infinite alternate;
		}

		.medium-turns .absorb {
			animation: absorb-medium 1.2s ease-in-out infinite alternate;
		}

		@keyframes absorb-short {
			from { transform: scaleY(1) scaleX(1.02) translateY(0); }
			to { transform: scaleY(0.85) scaleX(0.98) translateY(4px); }
		}

		@keyframes absorb-medium {
			from { transform: scaleY(1) scaleX(1.01) translateY(0); }
			to { transform: scaleY(0.86) scaleX(0.99) translateY(3.5px); }
		}

		@keyframes absorb-carving {
			from { transform: scaleY(1) scaleX(1.02) translateY(0); }
			to { transform: scaleY(0.84) scaleX(0.98) translateY(5px); }
		}

		/* Skier SVG */
		.skier-svg {
			position: absolute;
			left: 50%;
			top: 50%;
			width: 100%;
			height: 100%;
			margin-left: -50%;
			margin-top: -50%;
		}

		/* Arms with pole plants */
		.arm-front {
			transform-origin: 50% 32%;
			will-change: transform;
		}

		.short-turns .arm-front {
			animation: pole-plant-short 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
		}

		.carving .arm-front {
			animation: pole-plant-carving 4.4s cubic-bezier(0.42, 0, 0.58, 1) infinite;
		}

		.medium-turns .arm-front {
			animation: pole-plant-medium 2.4s cubic-bezier(0.43, 0.13, 0.57, 0.87) infinite;
		}

		@keyframes pole-plant-short {
			0%, 55% { transform: rotate(20deg); }
			65% { transform: rotate(60deg); }
			80% { transform: rotate(20deg); }
			100% { transform: rotate(20deg); }
		}

		@keyframes pole-plant-medium {
			0%, 55% { transform: rotate(20deg); }
			65% { transform: rotate(54deg); }
			80% { transform: rotate(20deg); }
			100% { transform: rotate(20deg); }
		}

		@keyframes pole-plant-carving {
			0%, 55% { transform: rotate(20deg); }
			65% { transform: rotate(48deg); }
			80% { transform: rotate(20deg); }
			100% { transform: rotate(20deg); }
		}

		.arm-back {
			transform-origin: 50% 32%;
			will-change: transform;
		}

		.short-turns .arm-back {
			animation: arm-back-short 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite reverse;
		}

		.carving .arm-back {
			animation: arm-back-carving 4.4s cubic-bezier(0.42, 0, 0.58, 1) infinite reverse;
		}

		.medium-turns .arm-back {
			animation: arm-back-medium 2.4s cubic-bezier(0.43, 0.13, 0.57, 0.87) infinite reverse;
		}

		@keyframes arm-back-short {
			0%, 55% { transform: rotate(-20deg); }
			65% { transform: rotate(-60deg); }
			80% { transform: rotate(-20deg); }
			100% { transform: rotate(-20deg); }
		}

		@keyframes arm-back-medium {
			0%, 55% { transform: rotate(-20deg); }
			65% { transform: rotate(-54deg); }
			80% { transform: rotate(-20deg); }
			100% { transform: rotate(-20deg); }
		}

		@keyframes arm-back-carving {
			0%, 55% { transform: rotate(-20deg); }
			65% { transform: rotate(-48deg); }
			80% { transform: rotate(-20deg); }
			100% { transform: rotate(-20deg); }
		}

		/* Scarf flutter with wind simulation */
		.scarf {
			transform-origin: 48% 38%;
			will-change: transform;
			animation: scarf-flutter 0.9s ease-in-out infinite alternate;
		}

		@keyframes scarf-flutter {
			from { transform: rotate(0deg) translateX(0) translateY(-1px); }
			to { transform: rotate(-16deg) translateX(3px) translateY(2px); }
		}

		/* Snow spray */
		.spray {
			will-change: transform;
		}

		.short-turns .spray {
			animation: spray-pulse 0.6s ease-in-out infinite;
		}

		.carving .spray {
			animation: spray-pulse 2.2s ease-in-out infinite;
		}

		.medium-turns .spray {
			animation: spray-pulse 1.2s ease-in-out infinite;
		}

		@keyframes spray-pulse {
			0%, 25% { transform: scaleX(0.9) scaleY(1.1); opacity: 0.7; }
			50% { transform: scaleX(1.4) scaleY(0.85); opacity: 1; }
			100% { transform: scaleX(0.7) scaleY(1); opacity: 0.6; }
		}

		/* Head tilt and look direction */
		.head {
			will-change: transform;
		}

		.short-turns .head {
			animation: head-tilt 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
		}

		.carving .head {
			animation: head-tilt 4.4s cubic-bezier(0.42, 0, 0.58, 1) infinite;
		}

		.medium-turns .head {
			animation: head-tilt 2.4s cubic-bezier(0.43, 0.13, 0.57, 0.87) infinite;
		}

		@keyframes head-tilt {
			0%, 50%, 100% { transform: rotate(0deg) translateY(0); }
			25% { transform: rotate(10deg) translateY(-1px); }
			75% { transform: rotate(-10deg) translateY(-1px); }
		}

		/* Goggle glint */
		.goggle-shine {
			will-change: opacity;
		}

		.short-turns .goggle-shine {
			animation: glint 1.2s ease-in-out infinite;
		}

		.carving .goggle-shine {
			animation: glint 4.4s ease-in-out infinite;
		}

		.medium-turns .goggle-shine {
			animation: glint 2.4s ease-in-out infinite;
		}

		@keyframes glint {
			0%, 30%, 70%, 100% { opacity: 0.4; }
			50% { opacity: 1; }
		}

	</style>
</head>
<body>
	<div class="scene">
		<div class="stars"></div>
		<div class="sun"></div>
		<div class="rays"></div>
